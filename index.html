<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Playfair+Display:ital,wght@1,900&display=swap');

        body { 
            background: #050505; 
            color: white; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', monospace; 
            cursor: url('img/my-cursor.png'), auto; 
            margin: 0; 
            min-height: 100vh;
        }

        /* Видео-фон */
        .video-bg {
            position: fixed; inset: 0; z-index: -3;
            width: 100vw; height: 100vh;
            object-fit: cover;
            filter: blur(15px) brightness(0.6);
            transition: filter 1s ease;
        }

        /* Градиентная виньетка: Синий -> Белый -> Оранжевый */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(
                45deg, 
                rgba(59, 130, 246, 0.2) 0%, 
                rgba(255, 255, 255, 0.05) 50%, 
                rgba(255, 69, 0, 0.2) 100%
            );
            box-shadow: inset 0 0 150px 50px rgba(255, 255, 255, 0.1);
            pointer-events: none; 
            z-index: -1;
        }

        /* Стиль для кнопок-папок */
        .glass-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }
        
        /* Эффект пролагивания при наведении */
        .glitch-btn:hover { animation: glitch-hover 0.2s infinite; box-shadow: 0 0 15px #3b82f6, 0 0 15px #ff4500; }
        @keyframes glitch-hover { 0%, 100% { transform: translate(0); } 33% { transform: translate(-3px, 2px); } 66% { transform: translate(3px, -2px); } }

        /* Эффект домино (змейка) для заголовка */
        .killer-header span {
            display: inline-block;
            animation: snake-jump 4s infinite;
            transition: 0.2s ease-out;
        }

        /* Фикс: при наведении отключаем анимацию змейки, чтобы увеличение работало стабильно */
        .killer-header span:hover {
            animation: none !important;
            transform: scale(1.6) translateY(-10px);
            color: #ff4500 !important;
            text-shadow: 0 0 15px #3b82f6;
        }
        @keyframes snake-jump {
            0%, 100% { transform: translateY(0); }
            5% { transform: translateY(-20px); }
            10% { transform: translateY(0); }
        }

        .win { position: absolute; background: rgba(0,0,0,0.9); border: 2px solid #3b82f6; box-shadow: 6px 6px 0 #ff4500; z-index: 10; }
        .win-header { background: #3b82f6; color: white; padding: 5px 10px; cursor: move; font-size: 12px; display: flex; justify-content: space-between; }
        
        .trail-star { position: absolute; pointer-events: none; z-index: 9999; color: #ff4500; font-weight: bold; font-size: 20px; }

        @media (max-width: 768px) {
            .btn-desktop { position: static !important; margin: 20px auto; display: block !important; width: 80%; }
        }
    </style>
</head>
<body onclick="playVideo()">

    <video autoplay muted loop playsinline class="video-bg" id="bg-video">
        <source src="img/bg.mp4" type="video/mp4">
    </video>
    
    <div id="stars" class="fixed inset-0 z-[-1] opacity-50"></div>

    <header class="p-10 pl-20 cursor-default">
        <h1 class="killer-header text-6xl uppercase tracking-tighter font-black">
            <span class="text-blue-500" style="animation-delay: 0.1s;">D</span><span class="text-white" style="animation-delay: 0.2s;">E</span><span class="text-blue-500" style="animation-delay: 0.3s;">R</span><span class="text-white" style="animation-delay: 0.4s;">V</span><span class="text-orange-500" style="animation-delay: 0.5s;">I</span><span class="text-blue-400" style="animation-delay: 0.6s;">S</span><span class="text-white" style="animation-delay: 0.7s;">S</span><span class="text-orange-500" style="animation-delay: 0.8s;">HH</span>
            <br>
            <span class="text-orange-400 font-mono">\\</span> 
            <span class="text-blue-300" style="animation-delay: 0.9s;">S</span><span class="text-white" style="animation-delay: 1.0s;">L</span><span class="text-blue-600" style="animation-delay: 1.1s;">O</span><span class="text-white" style="animation-delay: 1.2s;">Y</span><span class="text-blue-300" style="animation-delay: 1.3s;">PO</span><span class="text-orange-500" style="animation-delay: 1.4s;">CHI</span><span class="text-blue-600" style="animation-delay: 1.5s;">NA</span>

    </header>

    <!-- Хаотичные кнопки -->

    <a href="https://t.me/Dervisshh" target="_blank" onclick="createTrail(event)" class="btn-desktop absolute top-[60%] left-[70%] p-4 border-2 border-white hover:bg-blue-500 transition glass-btn glitch-btn">📂 TG_ACC.EXE</a>
    <a href="https://github.com/sloypochina" target="_blank" onclick="createTrail(event)" class="btn-desktop absolute top-[20%] left-[80%] p-4 border-2 border-white hover:bg-green-500 transition glass-btn glitch-btn">📂 GITHUB.EXE</a>
    <a href="http://nexus.lord-mikrotik.online/" target="_blank" onclick="createTrail(event)" class="btn-desktop absolute top-[50%] left-[40%] p-4 border-2 border-white hover:bg-purple-500 transition glass-btn glitch-btn">📂 SITE_TOVARISHA.EXE</a>

    <!-- Предупреждение -->
    <div id="alert-win" class="win hidden w-64 p-4 top-40 left-40">
        <p class="mb-4 text-sm">У меня хобби кароче, биты писать иногда, на те прикольнись, послушай)</p>
        <button onclick="openPlayer()" class="bg-blue-600 px-4 py-2 text-white border border-white">ОК, СЛУХАНУ КА</button>
    </div>

    <!-- Плеер -->
    <div id="player-win" class="win hidden w-80">
        <div class="win-header">
            <span>MUSIC_PLAYER.EXE</span>
            <button onclick="$('#player-win').hide(); resetVideo()">X</button>
        </div>
        <div class="p-4 space-y-2">
            <audio id="audio" controls class="w-full"></audio>
            <button onclick="play('audio/9bitCZH.m4a')" class="w-full border p-1 text-xs hover:bg-blue-900">1. Space gun wtf</button>

            <button onclick="play('audio/31bitE.m4a')" class="w-full border p-1 text-xs hover:bg-blue-900">3. Energy hard thing </button>
            <button onclick="play('audio/27bitZacepin.m4a')" class="w-full border p-1 text-xs hover:bg-blue-900">4. Chill Space Zacepin </button>
            <button onclick="play('audio/26bitEa.m4a')" class="w-full border p-1 text-xs hover:bg-blue-900">5. Fast Funny Funk </button>
            <button onclick="play('audio/23bitlithekanye.m4a')" class="w-full border p-1 text-xs hover:bg-blue-900">6. Pablo Kanye style </button>
            <button onclick="play('tonoisetosilence.m4a')" class="w-full border p-1 text-xs hover:bg-blue-900">7. Carti pop out type </button>

    </div>

    <!-- Секция для фото и подвала -->
    <div class="mt-[100vh] p-10 bg-black/50 text-center">
        <h2 class="text-3xl mb-10 glitch">GALLERY</h2>
        <div class="grid grid-cols-2 gap-6 max-w-4xl mx-auto">
             <div class="glass-btn p-3 border border-blue-500/30">
                 <img src="img/photo1.webp" alt="Vibe" class="w-full h-auto border border-white/10">
                 <p class="text-xs text-blue-400 mt-3 font-mono tracking-widest">[ 01 ] DERV_MOOD.WEBP</p>
             </div>
             <div class="glass-btn p-3 border border-orange-500/30">
                 <img src="img/photo2.webp" alt="Vibe" class="w-full h-auto border border-white/10">
                 <p class="text-xs text-orange-500 mt-3 font-mono tracking-widest">[ 02 ] SLOY_STYLE.WEBP</p>
             </div>
        </div>
        <footer class="mt-20 text-gray-500 text-xs">
            © 2026 Dervisshh // Sloypochina. All rights reserved.
        </footer>
    </div>

    <script>
        $(".win").draggable({ handle: ".win-header", drag: function(e) { createTrail(e); } });
        
        function playVideo() { document.getElementById('bg-video').play(); }
        
        function openPlayer() { $('#alert-win').hide(); $('#player-win').show(); }
        
        function play(src) { 
            const a = document.getElementById('audio'); 
            a.src = src; a.play();
            $('#bg-video').css('filter', 'blur(5px) grayscale(100%) brightness(1.2)');
        }

        function resetVideo() {
            $('#bg-video').css('filter', 'blur(15px) brightness(0.6)');
            const a = document.getElementById('audio');
            a.pause();
        }
        
        function createTrail(e) {
            const el = document.createElement('div');
            el.className = 'trail-star';
            el.innerHTML = '✦';
            el.style.left = e.pageX + 'px'; el.style.top = e.pageY + 'px';
            document.body.appendChild(el);
            $(el).animate({ opacity: 0, top: '+=100px', fontSize: '30px' }, 1000, () => el.remove());
        }

        const stars = document.getElementById('stars');
        for(let i=0; i<60; i++) {
            const s = document.createElement('div');
            s.className = 'absolute text-red-500 font-bold';
            s.style.left = Math.random()*100 + '%'; s.style.top = Math.random()*100 + '%';
            s.innerHTML = '✦'; stars.appendChild(s);
        }
    </script>
</body>
</html>
